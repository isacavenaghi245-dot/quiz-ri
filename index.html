<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seu metabolismo está mandando sinais?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-200: #5DCAA5;
    --teal-400: #1D9E75; --teal-600: #0F6E56; --teal-800: #085041;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-400: #D85A30;
    --coral-600: #993C1D; --coral-800: #712B13;
    --gray-50: #F8F6F2; --gray-100: #EDEDEA; --gray-200: #D4D2CC;
    --gray-500: #888780; --gray-700: #4A4A48; --gray-900: #1C1C1A;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--gray-50);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    color: var(--gray-900);
  }

  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    width: 100%;
    max-width: 520px;
    overflow: hidden;
  }

  .card-top {
    background: var(--teal-800);
    padding: 2rem 2rem 1.75rem;
  }

  .badge {
    display: inline-block;
    background: var(--teal-400);
    color: var(--teal-50);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: .875rem;
  }

  .card-top h1 {
    font-size: 22px;
    font-weight: 600;
    color: white;
    line-height: 1.3;
    margin-bottom: .5rem;
  }

  .card-top p {
    font-size: 14px;
    color: var(--teal-100);
    line-height: 1.65;
  }

  .card-body { padding: 1.75rem 2rem 2rem; }

  .meta-row {
    display: flex;
    gap: 16px;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--gray-500);
  }
  .meta-icon { font-size: 15px; }

  .btn-start {
    width: 100%;
    padding: 14px;
    background: var(--teal-800);
    color: var(--teal-100);
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-start:hover { opacity: .88; }

  /* progress */
  .prog-wrap { margin-bottom: 1.5rem; }
  .prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
  .prog-track { height: 5px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--teal-400); border-radius: 3px; transition: width .4s ease; }

  /* pergunta */
  .q-context {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.6;
    margin-bottom: 1.25rem;
    padding: 10px 14px;
    background: var(--gray-50);
    border-radius: 8px;
    border-left: 3px solid var(--teal-200);
  }
  .q-text { font-size: 18px; font-weight: 600; color: var(--gray-900); line-height: 1.4; margin-bottom: 1.25rem; }

  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
  .opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--gray-200);
    border-radius: 12px;
    cursor: pointer;
    background: white;
    text-align: left;
    font-family: inherit;
    width: 100%;
    transition: border-color .15s, background .15s;
  }
  .opt:hover { border-color: var(--teal-200); background: var(--teal-50); }
  .opt.selected { border-color: var(--teal-400); background: var(--teal-50); }
  .opt.selected .opt-letter { background: var(--teal-800); color: var(--teal-100); }
  .opt-letter {
    min-width: 30px; height: 30px; border-radius: 50%;
    background: var(--gray-100);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--gray-500);
    flex-shrink: 0; margin-top: 1px;
  }
  .opt-label { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-bottom: 2px; }
  .opt-sub { font-size: 12px; color: var(--gray-500); line-height: 1.5; }

  .btn-next {
    width: 100%;
    padding: 13px;
    background: var(--teal-800);
    color: var(--teal-100);
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-next:hover:not(:disabled) { opacity: .88; }
  .btn-next:disabled { opacity: .35; cursor: default; }

  /* resultado */
  .result-box {
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .result-box.low { background: var(--teal-50); border: 1.5px solid var(--teal-100); }
  .result-box.mid { background: var(--amber-50); border: 1.5px solid var(--amber-100); }
  .result-box.high { background: var(--coral-50); border: 1.5px solid var(--coral-100); }

  .result-emoji { font-size: 36px; margin-bottom: .75rem; display: block; }
  .result-title { font-size: 19px; font-weight: 700; margin-bottom: .5rem; }
  .result-box.low .result-title { color: var(--teal-800); }
  .result-box.mid .result-title { color: var(--amber-800); }
  .result-box.high .result-title { color: var(--coral-800); }

  .result-desc { font-size: 14px; line-height: 1.7; }
  .result-box.low .result-desc { color: var(--teal-600); }
  .result-box.mid .result-desc { color: var(--amber-600); }
  .result-box.high .result-desc { color: var(--coral-600); }

  .insights { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
  .insight {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    border: 1px solid var(--gray-100);
    border-radius: 10px;
    background: var(--gray-50);
  }
  .insight-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .insight-dot.low { background: var(--teal-400); }
  .insight-dot.mid { background: var(--amber-100); }
  .insight-dot.high { background: var(--coral-400); }
  .insight-text { font-size: 13px; color: var(--gray-500); line-height: 1.65; }
  .insight-text strong { color: var(--gray-900); font-weight: 600; }

  .btn-cta {
    width: 100%;
    padding: 14px;
    background: var(--teal-800);
    color: var(--teal-100);
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 10px;
    transition: opacity .15s;
  }
  .btn-cta:hover { opacity: .88; }

  .btn-restart {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--gray-500);
    border: 1.5px solid var(--gray-200);
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background .15s;
  }
  .btn-restart:hover { background: var(--gray-50); }

  .screen { display: none; }
  .screen.active { display: block; }

  @media (max-width: 400px) {
    .card-top { padding: 1.5rem; }
    .card-body { padding: 1.25rem; }
    .card-top h1 { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <span class="badge">⚡ Quiz metabólico</span>
    <h1>Seu metabolismo está mandando sinais?</h1>
    <p>Responda 7 perguntas rápidas e descubra como seu corpo está respondendo à insulina — e o que isso significa pra você.</p>
  </div>

  <div class="card-body">

    <!-- INTRO -->
    <div id="s-intro" class="screen active">
      <div class="meta-row">
        <span class="meta-item"><span class="meta-icon">🕑</span> 2 minutos</span>
        <span class="meta-item"><span class="meta-icon">🔒</span> Só para você</span>
        <span class="meta-item"><span class="meta-icon">📊</span> Resultado na hora</span>
      </div>
      <button class="btn-start" onclick="start()">
        Começar o quiz →
      </button>
    </div>

    <!-- QUIZ -->
    <div id="s-quiz" class="screen">
      <div class="prog-wrap">
        <div class="prog-meta">
          <span id="q-label">Pergunta 1 de 7</span>
          <span id="q-pct">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      </div>
      <div id="q-context" class="q-context"></div>
      <div id="q-text" class="q-text"></div>
      <div class="opts" id="opts"></div>
      <button class="btn-next" id="btn-next" onclick="next()" disabled>Próxima →</button>
    </div>

    <!-- RESULTADO -->
    <div id="s-result" class="screen">
      <div id="result-box" class="result-box">
        <span id="result-emoji" class="result-emoji"></span>
        <div id="result-title" class="result-title"></div>
        <div id="result-desc" class="result-desc"></div>
      </div>
      <div class="insights" id="insights"></div>
      <!-- EDITE O LINK ABAIXO com seu WhatsApp ou agendamento -->
      <a class="btn-cta" href="https://wa.me/5519XXXXXXXXX" target="_blank">
        💬 Falar com minha nutricionista
      </a>
      <button class="btn-restart" onclick="restart()">↩ Refazer o quiz</button>
    </div>

  </div>
</div>

<script>
const questions = [
  {
    label: "Pergunta 1 de 7",
    context: "Não pense no que deveria sentir — pense em como realmente está na maioria dos dias.",
    text: "Como está sua energia ao longo do dia?",
    opts: [
      { label: "Boa e constante", sub: "Acordo disposto e mantenho energia até a noite", score: 0 },
      { label: "Vai e vem", sub: "Tenho picos de energia mas também quedas bruscas", score: 1 },
      { label: "Cansaço constante", sub: "Me sinto pesado e sem energia na maior parte do dia", score: 2 },
    ]
  },
  {
    label: "Pergunta 2 de 7",
    context: "Pense nas últimas semanas. Mesmo depois de uma refeição completa, a fome volta rápido?",
    text: "Você sente fome pouco tempo depois de comer?",
    opts: [
      { label: "Raramente", sub: "Fico saciado por 3–4 horas normalmente", score: 0 },
      { label: "Às vezes", sub: "Depende muito do que comi", score: 1 },
      { label: "Quase sempre", sub: "Parece que nunca fico satisfeito de verdade", score: 2 },
    ]
  },
  {
    label: "Pergunta 3 de 7",
    context: "Aquela vontade intensa de pão, biscoito, chocolate — especialmente à tarde ou à noite.",
    text: "Você tem vontade frequente de doce ou carboidrato?",
    opts: [
      { label: "Pouca ou nenhuma", sub: "Consigo passar sem sentir essa vontade", score: 0 },
      { label: "De vez em quando", sub: "Em alguns dias fica difícil resistir", score: 1 },
      { label: "Todo dia", sub: "É quase uma compulsão — o corpo parece pedir", score: 2 },
    ]
  },
  {
    label: "Pergunta 4 de 7",
    context: "Gordura abdominal — especialmente a visceral — é um dos principais sinais de inflamação metabólica.",
    text: "Como está sua barriga comparada ao resto do corpo?",
    opts: [
      { label: "Sem acúmulo evidente", sub: "Meu peso está distribuído de forma equilibrada", score: 0 },
      { label: "Algum acúmulo", sub: "A barriga cresceu mais do que eu gostaria", score: 1 },
      { label: "Barriga proeminente", sub: "É onde acumulo mais gordura, bem visivelmente", score: 2 },
    ]
  },
  {
    label: "Pergunta 5 de 7",
    context: "Uma noite ruim de sono já é suficiente para aumentar a resistência à insulina no dia seguinte.",
    text: "Como tem sido seu sono?",
    opts: [
      { label: "Durmo bem", sub: "Acordo descansado na maioria dos dias", score: 0 },
      { label: "Irregular", sub: "Às vezes durmo bem, às vezes não", score: 1 },
      { label: "Sempre ruim", sub: "Acordo cansado quase todo dia", score: 2 },
    ]
  },
  {
    label: "Pergunta 6 de 7",
    context: "Musculação e caminhada são especialmente importantes para o metabolismo da glicose.",
    text: "Você pratica atividade física regularmente?",
    opts: [
      { label: "Sim, frequentemente", sub: "3 vezes por semana ou mais", score: 0 },
      { label: "Às vezes", sub: "1–2 vezes por semana ou de forma irregular", score: 1 },
      { label: "Muito pouco ou nenhuma", sub: "Fico sedentário na maior parte da semana", score: 2 },
    ]
  },
  {
    label: "Pergunta 7 de 7",
    context: "Mesmo fazendo dieta, mesmo se esforçando — o peso não vai, ou vai e volta rapidamente.",
    text: "Você já tentou emagrecer e sentiu que algo estava travando?",
    opts: [
      { label: "Não, tenho conseguido", sub: "Quando me empenho, consigo ver resultados", score: 0 },
      { label: "Um pouco difícil", sub: "Demora mais do que eu esperaria", score: 1 },
      { label: "Parece um muro", sub: "Faço de tudo e o resultado não aparece", score: 2 },
    ]
  }
];

const results = {
  low: {
    cls: "low", emoji: "🌱",
    title: "Sinais leves — momento de prevenção",
    desc: "Seu metabolismo ainda está respondendo bem. Alguns hábitos podem ser ajustados agora para evitar que a resistência à insulina avance. Prevenir é muito mais simples do que reverter.",
    insights: [
      { cls: "low", text: "<strong>Boa notícia:</strong> seu corpo ainda responde bem à insulina. Manter sono, alimentação e movimento consolida esse cenário." },
      { cls: "low", text: "<strong>Atenção preventiva:</strong> mesmo com poucos sintomas, o processo pode estar iniciando silenciosamente. Acompanhamento periódico é importante." },
      { cls: "low", text: "<strong>Próximo passo:</strong> foco em consistência — pequenas melhorias sustentadas têm impacto enorme no longo prazo." },
    ]
  },
  mid: {
    cls: "mid", emoji: "⚠️",
    title: "Sinais moderados — seu metabolismo pede atenção",
    desc: "Seu corpo está mostrando vários sinais de que a resistência à insulina pode estar se desenvolvendo. Não é urgência, mas é o momento certo para agir.",
    insights: [
      { cls: "mid", text: "<strong>Fome e cansaço não são fraqueza:</strong> esses sintomas têm base fisiológica. A resistência à insulina dificulta que a energia entre nas células." },
      { cls: "mid", text: "<strong>Cada mudança conta:</strong> sono, movimento e alimentação já começam a reduzir a inflamação metabólica em poucas semanas." },
      { cls: "mid", text: "<strong>Exames úteis:</strong> insulina em jejum, HOMA-IR e glicemia de jejum são os principais marcadores. Vale conversar com seu médico." },
    ]
  },
  high: {
    cls: "high", emoji: "🔥",
    title: "Sinais intensos — resistência provavelmente presente",
    desc: "Os sinais que você relatou são consistentes com um quadro de resistência à insulina estabelecida. Isso não é sentença — é informação. E com informação, dá pra agir.",
    insights: [
      { cls: "high", text: "<strong>Não é falta de força de vontade:</strong> com resistência à insulina elevada, o corpo está fisiologicamente contra o emagrecimento." },
      { cls: "high", text: "<strong>Inflamação metabólica:</strong> o conjunto de sintomas sugere que o metabolismo está sobrecarregado. Ele responde bem quando tratado certo." },
      { cls: "high", text: "<strong>Ação combinada:</strong> alimentação + movimento + sono + acompanhamento médico e nutricional funcionam muito melhor juntos." },
    ]
  }
};

let current = 0, answers = [], selected = null;

function start() {
  show('s-quiz');
  render();
}

function render() {
  const q = questions[current];
  selected = null;
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('q-context').textContent = q.context;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').textContent = current < questions.length - 1 ? 'Próxima →' : 'Ver meu resultado →';

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  ['A','B','C'].forEach((letter, i) => {
    const o = q.opts[i];
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<div class="opt-letter">${letter}</div><div><div class="opt-label">${o.label}</div><div class="opt-sub">${o.sub}</div></div>`;
    btn.onclick = () => {
      selected = o.score;
      document.querySelectorAll('.opt').forEach((el, j) => el.classList.toggle('selected', j === i));
      document.getElementById('btn-next').disabled = false;
    };
    optsEl.appendChild(btn);
  });
}

function next() {
  if (selected === null) return;
  answers.push(selected);
  current++;
  if (current >= questions.length) showResult();
  else render();
}

function showResult() {
  document.getElementById('prog').style.width = '100%';
  document.getElementById('q-pct').textContent = '100%';
  const total = answers.reduce((a, b) => a + b, 0);
  const key = total <= 4 ? 'low' : total <= 9 ? 'mid' : 'high';
  const r = results[key];

  document.getElementById('result-box').className = 'result-box ' + r.cls;
  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-title').textContent = r.title;
  document.getElementById('result-desc').textContent = r.desc;

  const ins = document.getElementById('insights');
  ins.innerHTML = '';
  r.insights.forEach(item => {
    const d = document.createElement('div');
    d.className = 'insight';
    d.innerHTML = `<div class="insight-dot ${item.cls}"></div><div class="insight-text">${item.text}</div>`;
    ins.appendChild(d);
  });

  show('s-result');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restart() {
  current = 0; answers = []; selected = null;
  show('s-intro');
}
</script>
</body>
</html>
